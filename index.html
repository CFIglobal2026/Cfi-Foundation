<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CFI Foundation | Launching Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#06142D;
    color:#fff;
}

/* ================= NAVBAR ================= */

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    background:#06142D;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 8%;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    width:55px;
    height:55px;
    object-fit:contain;
}

.logo h2{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

.logo span{
    color:#5db7ff;
}

/* ================= HERO ================= */

.hero{
    width:100%;
    min-height:100vh;
    padding-top:80px;
}

.hero img{
    width:100%;
    height:calc(100vh - 160px);
    object-fit:cover;
    display:block;
}

/* ================= FOOTER ================= */

footer{
    background:#06142D;
    padding:25px 8%;
    border-top:1px solid rgba(255,255,255,.08);
}

.footer-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.footer-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.footer-left img{
    width:50px;
}

.footer-left h3{
    font-size:24px;
}

.footer-left p{
    color:#9fb7d8;
    font-size:14px;
}

.footer-right{
    text-align:right;
}

.footer-right p{
    color:#9fb7d8;
    font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.navbar{
    height:auto;
    padding:15px;
}

.logo h2{
    font-size:20px;
}

.logo img{
    width:45px;
}

.hero{
    padding-top:75px;
}

.hero img{
    height:auto;
    min-height:calc(100vh - 160px);
    object-fit:contain;
}

.footer-content{
    flex-direction:column;
    text-align:center;
}

.footer-right{
    text-align:center;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">

<img src="logo.jpeg" alt="CFI Foundation Logo">

<h2>CFI <span>FOUNDATION</span></h2>

</div>

</nav>

<!-- FULL SCREEN IMAGE -->

<section class="hero">

<img src="launch.jpeg" alt="Launching Soon">

</section>

<!-- FOOTER -->

<footer>

<div class="footer-content">

<div class="footer-left">

<img src="logo.jpeg" alt="Logo">

<div>

<h3>CFI Foundation</h3>

<p>Empowering Futures. Building Nation.</p>

</div>

</div>

<div class="footer-right">

<p>🚀 Website Launching Soon</p>

<p>© 2026 CFI Foundation. All Rights Reserved.</p>

</div>

</div>

</footer>

</body>
</html>
