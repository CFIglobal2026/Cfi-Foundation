<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CFI Foundation | Admission Form</title>


<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

min-height:100vh;

background:linear-gradient(-45deg,
#001F54,
#003C9D,
#0057D9,
#008CFF);

background-size:400% 400%;

animation:bgAnimation 12s infinite ease;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

overflow-x:hidden;

}



/* Animated Background */

body::before{

content:"";

position:fixed;

width:350px;

height:350px;

background:rgba(255,255,255,0.12);

border-radius:50%;

top:-100px;

left:-100px;

animation:moveCircle 8s infinite alternate;

}


body::after{

content:"";

position:fixed;

width:300px;

height:300px;

background:rgba(255,255,255,0.08);

border-radius:50%;

bottom:-100px;

right:-80px;

animation:moveCircle2 10s infinite alternate;

}



/* Main Card */

.container{

width:100%;

max-width:1000px;

background:rgba(255,255,255,0.95);

backdrop-filter:blur(20px);

border-radius:25px;

padding:45px;

box-shadow:

0 25px 60px rgba(0,0,0,.3);

animation:slideUp 1s ease;

position:relative;

z-index:2;

}



/* Header */

.header{

text-align:center;

margin-bottom:35px;

}


.logo{

width:100px;

height:100px;

object-fit:contain;

margin-bottom:15px;

transition:.5s;

}


.logo:hover{

transform:scale(1.1) rotate(5deg);

}



.header h1{

font-size:36px;

font-weight:800;

color:#003C9D;

letter-spacing:2px;

}


.header h2{

font-size:25px;

color:#0057D9;

margin-top:10px;

}


.header p{

color:#555;

margin-top:8px;

font-size:16px;

}



/* Form */

form{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:22px;

}



.form-group{

display:flex;

flex-direction:column;

}



.form-group.full{

grid-column:1/-1;

}



label{

font-weight:600;

color:#003366;

margin-bottom:8px;

}



input,
select,
textarea{


padding:15px;

border-radius:12px;

border:2px solid #d8e6ff;

font-size:15px;

outline:none;

transition:.3s;

background:white;

}



input:focus,
select:focus,
textarea:focus{

border-color:#0057D9;

box-shadow:

0 0 20px rgba(0,87,217,.25);

transform:translateY(-2px);

}



textarea{

height:120px;

resize:none;

}



/* Button */

button{

grid-column:1/-1;

padding:17px;

border:none;

border-radius:14px;

background:

linear-gradient(135deg,#0057D9,#008CFF);

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.4s;

}



button:hover{

transform:translateY(-5px);

box-shadow:

0 15px 35px rgba(0,87,217,.4);

}



/* Footer */

.footer{

text-align:center;

margin-top:30px;

color:#666;

font-size:14px;

}



/* Popup */

#successPopup{

display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:white;

padding:35px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.3);

z-index:9999;

}



#successPopup h2{

color:#0057D9;

margin-bottom:15px;

}



/* Animations */


@keyframes bgAnimation{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}


@keyframes slideUp{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}


@keyframes moveCircle{

from{

transform:translate(0,0);

}

to{

transform:translate(80px,100px);

}

}


@keyframes moveCircle2{

from{

transform:translate(0,0);

}

to{

transform:translate(-80px,-100px);

}

}



/* Mobile */

@media(max-width:768px){


.container{

padding:25px;

}


form{

grid-template-columns:1fr;

}


.header h1{

font-size:28px;

}


}


</style>

</head>


<body>


<div class="container">


<div class="header">


<img src="logo.jpeg" class="logo" alt="CFI Foundation Logo">


<h1>CFI FOUNDATION</h1>

<h2>Admission Form</h2>

<p>Building Future Professionals</p>


</div>



<form id="registrationForm">


<div class="form-group">

<label>
<i class="fa-solid fa-user"></i>
Full Name
</label>

<input 
type="text"
name="name"
placeholder="Enter Full Name"
required>

</div>



<div class="form-group">

<label>
<i class="fa-solid fa-phone"></i>
Mobile Number
</label>

<input
type="tel"
name="mobile"
placeholder="Enter Mobile Number"
required>

</div>



<div class="form-group">

<label>
<i class="fa-solid fa-envelope"></i>
Email
</label>

<input
type="email"
name="email"
placeholder="Enter Email"
required>

</div>



<div class="form-group">

<label>
<i class="fa-solid fa-calendar"></i>
Date of Birth
</label>

<input
type="date"
name="dob"
required>

</div>
<div class="form-group">

<label>
<i class="fa-solid fa-venus-mars"></i>
Gender
</label>

<select name="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>




<div class="form-group">

<label>
<i class="fa-solid fa-graduation-cap"></i>
Highest Qualification
</label>

<input
type="text"
name="qualification"
placeholder="Enter Qualification"
required>

</div>




<div class="form-group">

<label>
<i class="fa-solid fa-book"></i>
Course Applying For
</label>

<input
type="text"
name="course"
placeholder="Enter Course Name"
required>

</div>




<div class="form-group full">

<label>
<i class="fa-solid fa-location-dot"></i>
Complete Address
</label>

<textarea
name="address"
placeholder="Enter Complete Address"
required></textarea>

</div>




<button type="submit" id="submitBtn">

<i class="fa-solid fa-paper-plane"></i>

<span id="btnText">
Submit Admission Form
</span>

</button>


</form>




<div class="footer">

© 2026 CFI Foundation | All Rights Reserved

</div>


</div>




<!-- SUCCESS POPUP -->


<div id="successPopup">


<h2>
✔ Registration Successful
</h2>


<p>
Thank you for registering with
<br>
<b>CFI Foundation</b>
</p>


<button onclick="closePopup()">

Close

</button>


</div>





<script>


// GOOGLE SHEET URL

const scriptURL =
"https://script.google.com/macros/s/AKfycbztpMdFXYA7R5IuB1U9Abgbxp0wjp_YZdPmd5O_eW7BGn0yeNwAab4SgBBlBmfpaJHt2A/exec";



const form =
document.getElementById("registrationForm");


const popup =
document.getElementById("successPopup");


const btn =
document.getElementById("submitBtn");


const btnText =
document.getElementById("btnText");





form.addEventListener("submit", function(e){


e.preventDefault();



btn.disabled=true;


btnText.innerHTML="Submitting...";



fetch(scriptURL,{

method:"POST",

body:new FormData(form)

})

.then(response => response.text())
.then(data => {

    popup.style.display = "block";

    form.reset();

    btn.disabled = false;

    btnText.innerHTML = "Submit Admission Form";

})


.catch(error=>{


alert("Something went wrong!");


console.log(error);


btn.disabled=false;


btnText.innerHTML="Submit Admission Form";


});



});





function closePopup(){


popup.style.display="none";


}



</script>



</body>

</html>
